<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Campaign - Vizo Đồng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css">
</head>
<body class="home-page">
<nav class="navbar navbar-expand-lg vz-topbar sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/home">🟣 Vizo Đồng</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#vzNavbarCampaignCreate">
            <span class="text-white">☰</span>
        </button>
        <div class="collapse navbar-collapse" id="vzNavbarCampaignCreate">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center gap-lg-2">
                <li class="nav-item"><a class="nav-link" href="/home">Explorer</a></li>
                <li class="nav-item"><a class="nav-link" href="/campaigns">Campaigns</a></li>
                <li class="nav-item"><a class="nav-link" href="/history">Transactions</a></li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle vz-user-menu" href="#" role="button" data-bs-toggle="dropdown">
                        <span>👤</span>
                        <span sec:authentication="name">user</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="/profile">Account Overview</a></li>
                        <li><a class="dropdown-item" href="/campaigns">My Campaigns</a></li>
                        <li><a class="dropdown-item" href="/transfer">Transfer Funds</a></li>
                        <li><a class="dropdown-item" href="/admin" sec:authorize="hasRole('ADMIN')">Admin Dashboard</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="/logout">Logout</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="card p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="mb-0">➕ Tạo Campaign mới</h3>
            <a href="/campaigns" class="btn btn-secondary">← Về danh sách campaign</a>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/campaigns}" method="post" th:object="${campaignCreate}" class="row g-3">
            <div class="col-12">
                <label class="form-label">Tên campaign</label>
                <input type="text" th:field="*{name}" class="form-control" required>
            </div>
            <div class="col-12">
                <label class="form-label">Mô tả</label>
                <textarea th:field="*{description}" class="form-control" rows="4"></textarea>
            </div>
            <div class="col-md-6">
                <label class="form-label">Mục tiêu quyên góp (VĐ)</label>
                <input type="number" th:field="*{goalAmount}" class="form-control" min="1000" step="1000" required>
            </div>
            <div class="col-12 d-grid d-md-flex gap-2">
                <button type="submit" class="btn btn-primary">Tạo campaign</button>
                <a href="/campaigns" class="btn btn-outline-secondary">Hủy</a>
            </div>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/theme-toggle.js}" src="/js/theme-toggle.js"></script>
<script th:src="@{/js/flash-auto-hide.js}" src="/js/flash-auto-hide.js"></script>
</body>
</html>
