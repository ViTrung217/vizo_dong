<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuyển tiền - Vizo Đồng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css">
</head>
<body class="home-page">
    <nav class="navbar navbar-expand-lg vz-topbar sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/home">🟣 Vizo Đồng</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#vzNavbarTransfer">
                <span class="text-white">☰</span>
            </button>
            <div class="collapse navbar-collapse" id="vzNavbarTransfer">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center gap-lg-2">
                    <li class="nav-item"><a class="nav-link" href="/home">Explorer</a></li>
                    <li class="nav-item"><a class="nav-link" href="/campaigns">Campaigns</a></li>
                    <li class="nav-item"><a class="nav-link" href="/history">Transactions</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle vz-user-menu" href="#" role="button" data-bs-toggle="dropdown">
                            <span>👤</span>
                            <span sec:authentication="name">user</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="/profile">Account Overview</a></li>
                            <li><a class="dropdown-item" href="/campaigns">My Campaigns</a></li>
                            <li><a class="dropdown-item" href="/transfer">Transfer Funds</a></li>
                            <li><a class="dropdown-item" href="/admin" sec:authorize="hasRole('ADMIN')">Admin Dashboard</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="/logout">Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4>💸 Chuyển tiền Vizo Đồng</h4>
                    </div>
                    <div class="card-body">
                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                        
                        <p>Số dư hiện tại: <strong><span th:text="${#numbers.formatDecimal(balance, 0, 'COMMA', 0, 'POINT')}"></span> VĐ</strong></p>
                        
                        <form th:action="@{/transfer}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Người nhận (Username):</label>
                                <input type="text" name="receiver" class="form-control" placeholder="Nhập chính xác username" required />
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Số tiền:</label>
                                <input type="number" name="amount" class="form-control" required min="1000" step="1000" />
                                <small class="text-muted">1 Vizo Đồng = 1 VNĐ</small>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Lời nhắn:</label>
                                <input type="text" name="message" class="form-control" placeholder="Nội dung chuyển tiền (tùy chọn)" />
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Xác nhận Chuyển tiền</button>
                        </form>
                        
                        <hr>
                        <a href="/home" class="btn btn-secondary">← Quay lại Trang chủ</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/theme-toggle.js}" src="/js/theme-toggle.js"></script>
    <script th:src="@{/js/flash-auto-hide.js}" src="/js/flash-auto-hide.js"></script>
</body>
</html>
