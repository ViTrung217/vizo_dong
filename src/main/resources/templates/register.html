<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vizo Đồng - Đăng ký</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css">
</head>
<body class="auth-page">
<div class="container auth-wrap d-flex align-items-center justify-content-center py-5">
    <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
        <div class="card auth-card p-4 p-md-5">
            <h1 class="h3 fw-bold mb-2 text-center"><span class="brand-dot"></span>Đăng ký tài khoản</h1>
            <p class="text-secondary text-center mb-4">Tạo tài khoản mới để bắt đầu với Vizo Đồng.</p>

            <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

            <form th:action="@{/register}" method="post" class="d-grid gap-3">
                <div>
                    <label for="username" class="form-label fw-semibold">Tên đăng nhập</label>
                    <input id="username" class="form-control form-control-lg" type="text" name="username" required>
                </div>
                <div>
                    <label for="email" class="form-label fw-semibold">Email</label>
                    <input id="email" class="form-control form-control-lg" type="email" name="email" required>
                </div>
                <div>
                    <label for="password" class="form-label fw-semibold">Mật khẩu</label>
                    <input id="password" class="form-control form-control-lg" type="password" name="password" required>
                </div>
                <div>
                    <label for="confirmPassword" class="form-label fw-semibold">Xác nhận mật khẩu</label>
                    <input id="confirmPassword" class="form-control form-control-lg" type="password" name="confirmPassword" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100">Đăng ký</button>
            </form>

            <p class="text-center text-secondary mt-4 mb-0">
                Đã có tài khoản?
                <a href="/login" class="text-decoration-none fw-semibold">Đăng nhập</a>
            </p>
        </div>
    </div>
</div>
<script th:src="@{/js/theme-toggle.js}" src="/js/theme-toggle.js"></script>
<script th:src="@{/js/flash-auto-hide.js}" src="/js/flash-auto-hide.js"></script>
</body>
</html>
