<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vizo Đồng - Đăng nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css">
</head>

<body class="auth-page">
    <div class="container auth-wrap d-flex align-items-center justify-content-center py-5">
        <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
            <div class="card auth-card p-4 p-md-5">
                <h1 class="h3 fw-bold mb-2 text-center"><span class="brand-dot"></span>Đăng nhập Vizo Đồng</h1>
                <p class="text-secondary text-center mb-4">Chào mừng bạn quay lại.</p>

                <div th:if="${param.error}" class="alert alert-danger py-2 mb-3">Sai tên đăng nhập hoặc mật khẩu!</div>
                <div th:if="${param.logout}" class="alert alert-info py-2 mb-3">Bạn đã đăng xuất!</div>
                <div th:if="${success}" class="alert alert-success py-2 mb-3" th:text="${success}"></div>

                <form th:action="@{/login}" method="post" class="d-grid gap-3">
                    <div>
                        <label for="username" class="form-label fw-semibold">Tên đăng nhập</label>
                        <input id="username" class="form-control form-control-lg" type="text" name="username" required>
                    </div>
                    <div>
                        <label for="password" class="form-label fw-semibold">Mật khẩu</label>
                        <input id="password" class="form-control form-control-lg" type="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100">Đăng nhập</button>
                </form>

                <p class="text-center text-secondary mt-4 mb-0">
                    Chưa có tài khoản?
                    <a href="/register" class="text-decoration-none fw-semibold">Đăng ký ngay</a>
                </p>
            </div>
        </div>
    </div>
</body>

</html>
