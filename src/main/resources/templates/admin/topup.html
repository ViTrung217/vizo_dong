<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin - Nạp tiền ảo</title>
    <meta charset="UTF-8">
    <!-- Thêm Bootstrap cho đẹp -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="card border-danger">
        <div class="card-header bg-danger text-white">
            <h3>ADMIN TOOL - NẠP TIỀN ẢO </h3>
        </div>
        <div class="card-body">
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/admin/topup}" method="post">
                <div class="mb-3">
                    <label>Tên đăng nhập cần nạp:</label>
                    <input type="text" name="username" class="form-control" required />
                </div>
                <div class="mb-3">
                    <label>Số tiền (Vizo Đồng):</label>
                    <input type="number" name="amount" class="form-control" required min="1000" step="1000" />
                </div>
                <button type="submit" class="btn btn-danger">Xác nhận Nạp tiền</button>
                <a href="/home" class="btn btn-secondary">Quay lại Home</a>
            </form>
            <hr>
            <p class="text-muted"><i>Vì đây là môi trường học tập, chưa có cổng thanh toán thật. Admin dùng trang này để tạo tiền ảo cho các tài khoản test.</i></p>
        </div>
    </div>
</div>
</body>
</html>
