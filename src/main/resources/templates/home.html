<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <title>Vizo Đồng - Trang chủ</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css">
</head>
<div class="container mt-5">
    <div class="card">
        <div class="card-header">
            <h2>🔐 Vizo Đồng Wallet</h2>
        </div>
        <div class="card-body">
            <h4>Xin chào, <span th:text="${username}">User</span>!</h4>
            <hr>
            <div class="alert alert-success" role="alert">
                <h5>Số dư hiện tại của bạn:</h5>
                <h1 class="display-4 text-center">
                    <span th:text="${#numbers.formatDecimal(balance, 0, 'COMMA', 0, 'POINT')}">0</span>
                    <small>Vizo Đồng</small>
                </h1>
                <p class="text-muted">(Tương đương <span th:text="${balance}"></span> VNĐ)</p>
            </div>
            <a href="/transfer" class="btn btn-primary">💸 Chuyển tiền</a>
            <a href="/give-coffee" class="btn btn-warning">☕ Tặng Cà phê</a>
            <a href="/history" class="btn btn-secondary">📋 Lịch sử</a>
            <a href="/logout" class="btn btn-danger">🚪 Đăng xuất</a>
        </div>
    </div>
</div>
</body>
</html>
